version: '3.8'

services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:15-3.4
    container_name: pipeline-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline_gis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  # MapLibre Static Tile Server
  tileserver:
    image: nginx:alpine
    container_name: pipeline-tileserver
    ports:
      - "8080:80"
    volumes:
      - ./map-data:/usr/share/nginx/html:ro
      - ./tileserver.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pipeline-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pipeline_gis
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SQL_ECHO: "false"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - pipeline-network
    volumes:
      - ./backend:/app

  # React Frontend (optional - use npm dev locally)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: pipeline-ui
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     VITE_API_URL: http://localhost:8000
  #   depends_on:
  #     - backend
  #   networks:
  #     - pipeline-network

volumes:
  postgres_data:

networks:
  pipeline-network:
    driver: bridge
